<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KVV Live Departures</title>
    <link rel="icon" href="/static/icons/missing.png" type="image/png">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#c30a37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KVV Live">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/static/icons/missing.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/static/icons/missing.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/missing.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/static/icons/missing.png">
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 class="app-title">
                <img src="/static/icons/missing.png" alt="KVV Logo" class="header-logo">
                Live
            </h1>
            <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>

    <main class="main-content">
        <!-- Search Section -->
        <section class="search-section">
            <div class="search-container">
                <input
                    type="text"
                    id="stopInput"
                    class="search-input"
                    placeholder="Search station..."
                    autocomplete="off"
                >
                <button class="search-btn" onclick="searchStop()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
                <button class="favorite-btn" id="favoriteBtn" onclick="toggleFavorite()" title="Add to favorites">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                </button>
                <button class="home-btn" id="homeBtn" onclick="setHomeStation()" title="Set as home station">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </button>
            </div>

            <!-- Quick Stations -->
            <div class="quick-stations">
                <button class="quick-btn" onclick="quickSearch('Hauptbahnhof Vorplatz')">Hbf (Vorplatz)</button>
                <button class="quick-btn" onclick="quickSearch('Europaplatz')">Europaplatz</button>
                <button class="quick-btn" onclick="quickSearch('Marktplatz')">Marktplatz</button>
            </div>

            <!-- Favorites Section -->
            <div class="favorites-section" id="favoritesSection" style="display: none;">
                <div class="favorites-header">
                    <h3>Favorites</h3>
                </div>
                <div class="favorites-grid" id="favoritesGrid"></div>
            </div>
        </section>

        <!-- Filters Section -->
        <section class="filters-section">
            <div class="filter-group">
                <input
                    type="text"
                    id="lineFilter"
                    class="filter-input"
                    placeholder="Filter by line..."
                    oninput="applyFilter()"
                >
                <select id="typeFilter" class="filter-select" onchange="applyFilter()">
                    <option value="">All vehicles</option>
                    <option value="s">S-Bahn</option>
                    <option value="tram">Tram</option>
                    <option value="bus">Bus</option>
                </select>
                <label class="wheelchair-toggle">
                    <input type="checkbox" id="wheelchairFilter" onchange="applyFilter()">
                    <span class="toggle-slider"></span>
                    <span class="wheelchair-emoji">♿</span>
                </label>
            </div>

            <!-- Station Dropdown -->
            <select id="stationDropdown" class="station-dropdown" style="display:none;" onchange="switchStation()"></select>
        </section>

        <!-- Station Header -->
        <div class="station-section">
            <h2 id="stationHeader" class="station-name"></h2>
            <div class="countdown-badge" id="countdown">--</div>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="loading-container">
            <div class="spinner"></div>
            <p>Loading departures...</p>
        </div>

        <!-- Departures Grid -->
        <section class="departures-section">
            <div id="departuresGrid" class="departures-grid"></div>
        </section>
    </main>
</div>

<!-- Popup for future departures -->
<div id="popup" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closePopup()">×</button>
        <h2 id="popupHeader" class="modal-title"></h2>
        <div id="futureList" class="future-list"></div>
    </div>
</div>

<!-- Popup for station selection -->
<div id="stationSelectPopup" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeStationSelect()">×</button>
        <h2 class="modal-title">Select Station</h2>
        <div id="stationList" class="station-list"></div>
    </div>
</div>

<script src="/static/script.js"></script>
<script src="/static/theme.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker registered', reg))
                .catch(err => console.log('Service Worker registration failed', err));
        });
    }
</script>
</body>
</html>
