<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ app_name }} Live Departures</title>
    <link rel="icon" href="/static/icons/missing.png" type="image/png">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#c30a37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="{{ app_name }} Live">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/static/icons/missing.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/static/icons/missing.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/missing.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/static/icons/missing.png">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <!-- Umami Analytics -->
    <script defer src="https://umami.fuadserver.uk/script.js" data-website-id="8ef78a18-1cfb-43bd-8629-19789c615860"></script>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 class="app-title">
                <img src="/static/icons/missing.png" alt="{{ app_name }} Logo" class="header-logo" id="headerLogo">
                Live
            </h1>
            <div class="header-tabs">
                <button class="tab-btn active" onclick="switchTab('departures')">Departures</button>
                <button class="tab-btn" id="mapTabBtn" onclick="switchTab('map')" style="display: none;">Map</button>
            </div>
            <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Notification Bar -->
    <div id="notificationBar" class="notification-bar{% if dev_mode %} notification-bar-editable{% endif %}" style="display: none;">
        <div class="notification-bar-content">
            <span id="notificationText" class="notification-text"></span>
        </div>
        {% if dev_mode %}
        <button class="notification-edit-btn" onclick="event.stopPropagation(); openNotificationEdit()" title="Edit notification bar">✎</button>
        {% endif %}
    </div>

    <main class="main-content">
        <!-- Departures Tab -->
        <div id="departuresTab" class="tab-content active">
            <!-- Search Section -->
            <section class="search-section">
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <input
                            type="text"
                            id="stopInput"
                            class="search-input"
                            placeholder="Search Station..."
                            autocomplete="off"
                            oninput="toggleClearButton()"
                        >
                        <button id="clearInputBtn" class="clear-btn" onclick="clearSearchInput()" title="Clear search">×</button>
                        <button class="locate-me-btn-icon" id="locateMeBtn" onclick="locateNearestStation()" title="Locate nearest station" style="display: none;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <button class="search-btn" onclick="searchStop()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>
                <div class="search-container city-search-container">
                    <div class="search-input-wrapper">
                        <input
                            type="text"
                            id="cityInput"
                            class="search-input city-input"
                            placeholder="City (default: Karlsruhe)"
                            autocomplete="off"
                        >
                    </div>
                    <button class="favorite-btn" id="favoriteBtn" onclick="toggleFavorite()" title="Add to favorites">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                    <button class="home-btn" id="homeBtn" onclick="setHomeStation()" title="Set as home station">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                    </button>
                </div>

                <!-- Quick Stations -->
                <div class="quick-stations">
                    <button class="quick-btn" onclick="quickSearch('Hauptbahnhof Vorplatz')">Hbf (Vorplatz)</button>
                    <button class="quick-btn" onclick="quickSearch('Europaplatz')">Europaplatz</button>
                    <button class="quick-btn" onclick="quickSearch('Marktplatz')">Marktplatz</button>
                </div>

                <!-- Favorites Section -->
                <div class="favorites-section" id="favoritesSection" style="display: none;">
                    <div class="favorites-header">
                        <h3>Favorites</h3>
                    </div>
                    <div class="favorites-grid" id="favoritesGrid"></div>
                </div>
            </section>

            <!-- Filters Section -->
            <section class="filters-section">
                <div class="filter-group">
                    <input
                        type="text"
                        id="lineFilter"
                        class="filter-input"
                        placeholder="Filter By Line..."
                        oninput="applyFilter()"
                    >
                    <select id="typeFilter" class="filter-select" onchange="applyFilter()">
                        <option value="">All Vehicles</option>
                        <option value="s">S-Bahn</option>
                        <option value="stadtbahn">Stadtbahn</option>
                        <option value="tram">Tram</option>
                        <option value="bus">Bus</option>
                        <option value="farbus">Long Distance Bus</option>
                        <option value="ferry">Ferry</option>
                        <option value="train">Train</option>
                    </select>
                    <label class="wheelchair-toggle">
                        <input type="checkbox" id="wheelchairFilter" onchange="applyFilter()">
                        <span class="toggle-slider"></span>
                        <span class="wheelchair-emoji">♿</span>
                    </label>
                    <div class="experimental-toggle-container">
                        <label class="experimental-toggle">
                            <input type="checkbox" id="experimentalToggle" onchange="toggleExperimentalFeatures()">
                            <span class="toggle-slider"></span>
                        </label>
                        <span class="experimental-label">Enable Experimental Features</span>
                    </div>
                </div>

                <!-- Station Dropdown -->
                <select id="stationDropdown" class="station-dropdown" style="display:none;" onchange="switchStation()"></select>
            </section>

            <!-- Station Header -->
            <div class="station-section">
                <h2 id="stationHeader" class="station-name"></h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button id="updateNowBtn" class="search-btn" style="display: none; padding: 6px 12px; font-size: 12px; background: #2e7d32;" onclick="updateNow()">Update Now</button>
                    <button id="pauseUpdatesBtn" class="search-btn" style="display: none; padding: 6px 12px; font-size: 12px;" onclick="togglePauseUpdates()">Pause Updates</button>
                    <button id="clearOverridesBtn" class="search-btn" style="display: none; padding: 6px 12px; font-size: 12px; background: #b35a00;" onclick="clearDebugOverrides()">Clear Overrides</button>
                    <button id="resetAppDataBtn" class="search-btn" style="display: none; padding: 6px 12px; font-size: 12px; background: #c62828;" onclick="resetAppData()">Reset App Data</button>
                    <button id="devLocationBtn" class="search-btn" style="display: none; padding: 6px 12px; font-size: 12px; background: #0b6b3a;" onclick="openDevLocation()">Set Dev Location</button>
                    <button id="leaveDebugBtn" class="search-btn" style="display: none; padding: 6px 12px; font-size: 12px; background: #666;" onclick="logoutDebug()">Leave Dev Mode</button>
                    <div class="countdown-badge" id="countdown">--</div>
                </div>
            </div>

            <!-- Loading Indicator -->
            <div id="loading" class="loading-container">
                <div class="spinner"></div>
                <p>Loading departures...</p>
            </div>

            <!-- Error Message Box -->
            <div id="errorBox" class="error-box" style="display: none;">
                <button class="error-close" onclick="closeError()">×</button>
                <p id="errorMessage"></p>
            </div>

            <!-- Departures Grid -->
            <section class="departures-section">
                <div id="departuresGrid" class="departures-grid"></div>
            </section>
        </div>

        <!-- Map Tab -->
        <div id="mapTab" class="tab-content">
            <div style="position: relative;">
                <div id="map" style="height: calc(100vh - 180px); width: 100%; border-radius: 12px; box-shadow: var(--shadow);"></div>
                <div id="mapLoading" class="map-loading-indicator">
                    <div class="spinner"></div>
                    <span>Loading stations...</span>
                </div>
            </div>
        </div>
    </main>
</div>


<!-- Popup for station selection -->
<div id="stationSelectPopup" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeStationSelect()">×</button>
        <h2 class="modal-title">Select Station</h2>
        <div id="stationList" class="station-list"></div>
    </div>
</div>

<!-- Debug Login Popup -->
<div id="debugLoginPopup" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeDebugLogin()">×</button>
        <h2 class="modal-title">Dev Login</h2>
        <div class="debug-form">
            <input type="password" id="debugPassword" placeholder="Enter password..." class="search-input">
            <button class="search-btn" onclick="loginDebug()" style="margin-top: 10px; width: 100%;">Login</button>
            <p id="debugLoginError" style="color: red; display: none; margin-top: 10px;"></p>
        </div>
    </div>
</div>

<!-- Debug Edit Popup -->
<div id="debugEditPopup" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeDebugEdit()">×</button>
        <h2 class="modal-title">Edit Departure</h2>
        <div class="debug-form">
            <input type="hidden" id="editStopId">
            <input type="hidden" id="editLine">
            <input type="hidden" id="editDirection">
            <input type="hidden" id="editStableScheduledTime">
            
            <label for="editMinutes">Minutes Remaining:</label>
            <input type="number" id="editMinutes" class="search-input" style="margin-bottom: 15px;">
            
            <label for="editDelay">Delay (minutes):</label>
            <input type="number" id="editDelay" class="search-input" style="margin-bottom: 15px;">
            
            <div style="display: flex; gap: 10px;">
                <button class="search-btn" onclick="saveDebugOverride()" style="flex: 1;">Save</button>
                <button class="search-btn" onclick="clearDebugOverride()" style="flex: 1; background: #666;">Reset</button>
            </div>
        </div>
    </div>
</div>

{% if dev_mode %}
<!-- Notification Bar Edit Popup -->
<div id="notificationEditPopup" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeNotificationEdit()">×</button>
        <h2 class="modal-title">Notification Bar</h2>
        <div class="debug-form">
            <label for="notificationWidth">Bar Width (%)</label>
            <input type="number" id="notificationWidth" class="search-input" min="10" max="100" step="1" style="margin-bottom: 15px;">

            <label for="notificationTextSize">Text Size (px)</label>
            <input type="number" id="notificationTextSize" class="search-input" min="10" max="30" step="1" style="margin-bottom: 15px;">

            <label for="notificationScrollDuration">Scroll Speed (seconds)</label>
            <input type="number" id="notificationScrollDuration" class="search-input" min="5" step="1" style="margin-bottom: 15px;">

            <div style="display: flex; gap: 10px;">
                <button class="search-btn" onclick="saveNotificationEdit()" style="flex: 1;">Save</button>
                <button class="search-btn" onclick="resetNotificationEdit()" style="flex: 1; background: #666;">Reset</button>
            </div>
        </div>
    </div>
</div>
{% endif %}

<!-- Dev Location Popup -->
<div id="devLocationPopup" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeDevLocation()">×</button>
        <h2 class="modal-title">Dev Location Override</h2>
        <div class="debug-form">
            <label for="devLatitude">Latitude:</label>
            <input type="number" id="devLatitude" class="search-input" step="any" placeholder="e.g. 49.0069" style="margin-bottom: 15px;">

            <label for="devLongitude">Longitude:</label>
            <input type="number" id="devLongitude" class="search-input" step="any" placeholder="e.g. 8.4037" style="margin-bottom: 15px;">

            <p id="devLocationError" style="color: red; display: none; margin-top: 10px;"></p>

            <div style="display: flex; gap: 10px;">
                <button class="search-btn" onclick="saveDevLocation()" style="flex: 1;">Save</button>
                <button class="search-btn" onclick="clearDevLocation()" style="flex: 1; background: #666;">Clear</button>
            </div>
        </div>
    </div>
</div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        window.APP_CONFIG = {
            devMode: {{ dev_mode | tojson }}
        };
    </script>
    <script src="/static/script.js"></script>
<script src="/static/theme.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker registered', reg))
                .catch(err => console.log('Service Worker registration failed', err));
        });
    }
</script>
</body>
</html>
